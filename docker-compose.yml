services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencode-openai-proxy
    ports:
      - "8082:8082"
    environment:
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-https://opencode.ai/zen}
      LISTEN_ADDR: ${LISTEN_ADDR:-:8082}
      LOG_FILE: ${LOG_FILE:-/app/logs/proxy.log}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
