services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencode-openai-proxy:latest
    container_name: opencode-openai-proxy
    ports:
      - "${LISTEN_PORT:-8082}:8082"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
